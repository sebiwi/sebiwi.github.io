name: External link check

# Advisory weekly check for external link rot. Kept OUT of the deploy pipeline
# on purpose: it hits the network and can fail for reasons unrelated to a change
# (a third-party site being down), so it must never block a deploy. It runs on a
# schedule and surfaces rot via a failed run / notification instead.

on:
  schedule:
    # Every Sunday at 06:00 UTC.
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  external-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUGO_VERSION: 0.164.0
      # Checksum of hugo_extended_0.164.0_linux-amd64.deb, from the release's
      # official checksums.txt. Update together with HUGO_VERSION.
      HUGO_DEB_SHA256: 8325f3653032d0fc536503691f4833dc4eb6c6be02ee62466758f3f37a7f2fcd
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          echo "${HUGO_DEB_SHA256}  ${{ runner.temp }}/hugo.deb" | sha256sum -c -
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Restore Hugo generated resources
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          # Key must stay in sync with deploy.yml so the two workflows share
          # the same cache entries.
          path: resources/_gen
          key: hugo-resources-${{ hashFiles('static/images/**', 'assets/**', 'content/**', 'hugo.toml') }}
          restore-keys: |
            hugo-resources-

      - name: Restore lychee cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          # lychee's --cache in test-external-links.sh reads/writes this file;
          # restoring the last run's cache lets known-good URLs be skipped.
          # Restore and save are split (instead of the plain cache action)
          # because the plain action skips its post-job save when the job
          # fails, and failing on link rot is this workflow's normal outcome.
          # run_attempt is in the key so a re-run of a failed run (same
          # run_id) can still save its updated cache.
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            lychee-cache-

      - name: Install lychee (link checker)
        run: |
          curl -sL -o lychee.tar.gz https://github.com/lycheeverse/lychee/releases/download/lychee-v0.21.0/lychee-x86_64-unknown-linux-gnu.tar.gz
          echo "a06547250f10021dcafc6ed5bb20fca75835b65711745b63cfdda34c29ff6a73  lychee.tar.gz" | sha256sum -c -
          tar xzf lychee.tar.gz
          sudo mv lychee /usr/local/bin/
          chmod +x /usr/local/bin/lychee

      - name: Check external links
        run: ./test/test-external-links.sh

      - name: Save Hugo generated resources
        # always(): failing on link rot is this workflow's normal outcome, and
        # the plain cache action skips its post-job save on failure — which
        # would discard any image variants this run regenerated. A no-op if the
        # content-hash key already exists (e.g. saved by deploy.yml).
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: resources/_gen
          key: hugo-resources-${{ hashFiles('static/images/**', 'assets/**', 'content/**', 'hugo.toml') }}

      - name: Save lychee cache
        # always(): save the cache even when the link check just failed, so
        # the next run only re-checks the URLs that actually rotted.
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}-${{ github.run_attempt }}
