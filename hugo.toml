baseURL = 'https://sebiwi.github.io/'
locale = 'en-us'
title = 'sebiwi'

[params]
  name = 'sebiwi'
  bio = 'Tech, fun, and cookies'
  description = 'Tech, fun and cookies'
  picture = '/images/profile.jpg'
  email = 'contact.sebiwi@gmail.com'

  # Feature toggles
  showReadTime = true
  showTags = true
  showRelated = true
  showAuthor = true
  showHomeLatest = true
  hyphenatePosts = false    # auto-hyphenate justified post body text (tighter spacing)
  animations = true

  # Social links
  [params.social]
    twitter = 'sebiwicb'
    github = 'sebiwi'

[pagination]
  pagerSize = 10

# Custom mounts replace Hugo's defaults, so the standard dirs are re-declared.
# The extra mount exposes static/images to the asset pipeline so those images
# can be processed (responsive resize / WebP) while still being served raw.
[module]
  [[module.mounts]]
    source = 'content'
    target = 'content'
  [[module.mounts]]
    source = 'layouts'
    target = 'layouts'
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    source = 'static'
    target = 'static'
  [[module.mounts]]
    source = 'static/images'
    target = 'assets/images'

[permalinks]
  blog = '/blog/:title/'
  comics = '/comics/:title/'

[taxonomies]
  tag = 'tags'

# Primary navigation, rendered by partials/nav.html (used in both the top bar
# and the home page). Add/remove/reorder links here — one source of truth.
[menu]
  [[menu.main]]
    name = 'Home'
    url = '/'
    weight = 1
  [[menu.main]]
    name = 'Blog'
    url = '/blog/'
    weight = 2
  [[menu.main]]
    name = 'Comics'
    url = '/comics/'
    weight = 3
  [[menu.main]]
    name = 'About'
    url = '/about/'
    weight = 4

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    lineNumbersInTable = false
    noClasses = true
    style = "tokyonight-night"
    tabWidth = 4
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2
