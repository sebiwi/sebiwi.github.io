{{/* Breadcrumb trail + BreadcrumbList JSON-LD for single pages
     (Home / Section / Title). */}}
{{ if and .IsPage .Section }}
{{ $sectionURL := printf "/%s/" .Section }}
{{ $sectionName := title .Section }}
<nav class="breadcrumbs" aria-label="Breadcrumb">
    <a href="/">Home</a>
    <span class="breadcrumb-sep" aria-hidden="true">/</span>
    <a href="{{ $sectionURL }}">{{ $sectionName }}</a>
    <span class="breadcrumb-sep" aria-hidden="true">/</span>
    <span class="breadcrumb-current" aria-current="page">{{ .Title }}</span>
</nav>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ "/" | absURL }}" },
    { "@type": "ListItem", "position": 2, "name": "{{ $sectionName }}", "item": "{{ $sectionURL | absURL }}" },
    { "@type": "ListItem", "position": 3, "name": {{ .Title | jsonify }}, "item": "{{ .Permalink }}" }
  ]
}
</script>
{{ end }}
