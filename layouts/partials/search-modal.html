<div id="search-modal" class="search-modal" role="dialog" aria-modal="true" aria-labelledby="search-label" hidden>
  <div class="search-backdrop"></div>
  <div class="search-container">
    <div class="search-chrome">
      <span class="search-dot" aria-hidden="true"></span>
      <span class="search-dot" aria-hidden="true"></span>
      <span class="search-dot" aria-hidden="true"></span>
      <span class="search-chrome-title">search · fzf</span>
      <kbd class="search-shortcut" aria-hidden="true"><span class="search-shortcut-key">⌘</span>K</kbd>
    </div>
    <div class="search-input-wrapper">
      <label id="search-label" class="sr-only">Search site content</label>
      <span class="search-prompt" aria-hidden="true">❯</span>
      <input
        type="search"
        id="search-input"
        placeholder="type to fuzzy-find posts and comics…"
        aria-label="Search posts and comics"
        aria-describedby="search-instructions"
        autocomplete="off"
        spellcheck="false">
    </div>
    <div id="search-instructions" class="sr-only">
      Use arrow keys to navigate results, Enter to select, Escape to close
    </div>
    <div id="search-results"
         class="search-results"
         role="status"
         aria-live="polite"
         aria-atomic="false">
      <div class="search-empty">~ awaiting input …</div>
    </div>
    <div id="search-status" class="search-status" aria-hidden="true"></div>
    <div class="search-footer">
      <span class="search-hint">
        <kbd>↑</kbd><kbd>↓</kbd> navigate
        <kbd>↵</kbd> open
        <kbd>esc</kbd> quit
      </span>
    </div>
  </div>
</div>
